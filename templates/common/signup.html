{% extends "base.html" %}
{% block content %}
<div class="container my-3">
    <h1 class="py-3">회원가입</h1>
    <form method="post" action="{% url 'common:signup' %}" style="margin-bottom: 70px;">
        <input type="hidden" name="next" value="{{ request.GET.next }}">
        {% csrf_token %}
        {% include "form_errors.html" %}
        
        <div class="mb-3">
            <label for="name">이름</label>
            <input type="text" class="form-control" name="name" id="name"
                   value="{{ form.name.value|default_if_none:'' }}">
        </div>

        <div class="mb-3">
            <label for="username">ID</label>
            <input type="text" class="form-control" name="username" id="username"
                   value="{{ form.username.value|default_if_none:'' }}">
        </div>

        <div class="mb-3">
            <label for="password1">비밀번호</label>
            <input type="password" class="form-control" name="password1" id="password1"
                   value="{{ form.password1.value|default_if_none:'' }}">
        </div>

        <div class="mb-3">
            <label for="password2">비밀번호 확인</label>
            <input type="password" class="form-control" name="password2" id="password2"
                   value="{{ form.password2.value|default_if_none:'' }}">
        </div>

        <div class="mb-3">
            <label for="email">이메일</label>
            <input type="text" class="form-control" name="email" id="email"
                   value="{{ form.email.value|default_if_none:'' }}">
        </div>

        <div class="pb-2 mb-3">
            <label for="phone">전화번호</label>
            <input type="tel" class="form-control" name="phone" id="phone"
                    value="{{ form.phone.value|default_if_none:'' }}" placeholder="- 없이 숫자만 입력"
                    pattern="\d+"
                    title="- 없이 숫자만 입력해주세요.">
        </div>

        <button type="submit" class="btn btn-primary">생성하기</button>
        <a href="{% url 'common:login' %}" class="btn btn-secondary" style="background-color:rgb(40, 170, 217);">
            <i class="bi bi-arrow-left"></i> 로그인
        </a>
    </form>
        <a href="#" onclick="window.history.back(); return false;" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> 돌아가기
        </a>
</div>
{% endblock %}
