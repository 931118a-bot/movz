{% extends "base.html" %}
{% block content %}
<div class="container my-3">
    <h1 class="py-3" >로그인</h1>
    <form method="post" action="{% url 'common:login' %}" style="margin-bottom: 150px;">
        {% csrf_token %}
        {% include "form_errors.html" %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">
        {% if messages %}
        <div class="alert-messages">
        {% for message in messages %}
            <div class="alert alert-danger" role="alert">
            {{ message }}
            </div>
        {% endfor %}
        </div>
        {% endif %}
        <div class="mb-3">
            <label for="username">사용자ID</label>
            <input type="text" class="form-control" name="username" id="username"
                   value="{{ form.username.value|default_if_none:'' }}">
        </div>
        <div class="pb-2 mb-3">
            <label for="password">비밀번호</label>
            <input type="password" class="form-control" name="password" id="password"
                   value="{{ form.password.value|default_if_none:'' }}">
        </div>
        <button type="submit" class="btn btn-primary">로그인</button>
        <a href="{% url 'common:signup' %}" class="btn btn-secondary" style="background-color:rgb(40, 170, 217);">
            <i class="bi bi-arrow-left"></i> 회원가입
        </a>
    </form>
    {% if request.GET.next %}
    <a href="{{ request.GET.next }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> 돌아가기
    </a>
    {% else %}
    <a href="#" onclick="window.history.back(); return false;" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> 돌아가기
    </a>
    {% endif %}
</div>
{% endblock %}
