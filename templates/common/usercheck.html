{% extends "base.html" %}
{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert-danger">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
            {% endif %}
            
            <h2 class="text-center mb-4">회원 탈퇴 확인</h2>
            <p class="text-center text-muted">회원 탈퇴를 위해 비밀번호를 다시 입력해 주세요.</p>
            
            <form method="post" action="{% url 'common:usercheck' %}" id="user-check-form">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="password" class="form-label">비밀번호</label>
                    <input type="password" class="form-control" name="password" id="password" required>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary" style="background-color: red;">회원 탈퇴</button>
                    <a href="{% url 'common:userinfo' %}" class="btn btn-secondary">취소(내 정보 확인)</a>
                </div>
            </form>
        </div>
    </div>
</div>
