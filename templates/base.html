{% load static %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<!doctype html>
<html lang="ko">
<head>
    <title>MOVz</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html, body { height: 100%; margin: 0; }
        body { display: flex; flex-direction: column; min-height: 100vh; padding-top: 230px;}  /* 화면 높이 꽉 채우기 */
        main { flex: 1; } /* 본문이 남은 공간을 다 차지하도록 */
        footer { background-color: #212529; color: white; text-align: center; font-size: 20px; }
        table { margin-left: 0 !important; margin-right: 0 !important; width: 100%;}
        /* collapse 영역 스타일 */
        #searchOptionBox { background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 12px 16px; width: 100%; max-width: 150px; }
        .filter-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .filter-item label { margin: 0; font-size: 15.2px; }
        /* collapse가 검색창 바로 아래에 딱 붙게 */
        .search-wrapper { position: relative; width: 100%; max-width: 500px; }
        .search-area { max-width: 500px; }
        /* collapse 박스 애니메이션 및 위치 조정 */
        #searchOptionBox .card { animation: fadeDown 0.25s ease; }
        /* 자연스러운 fade-down 효과 */
        @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-5px); }
        to { opacity: 1; transform: translateY(0); }
        }
        #movie_story {overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
    </style>
</head>
<body>
<!--nav bar-->
{% include "navbar.html" %}
<!-- 기본 템플릿 안에 삽입될 내용 Start -->
<main style="flex:1; padding: 0 2%; ">
{% block content %}
{% endblock %}
</main>
<div class="mt-3">
<footer style="background-color: #6c757d; padding: 30px 20;"><p>Copyright 2025 &copy; MOVz.</p><p>문정현, 김서영, 이승민</p></footer>
</div>
<!-- 기본 템플릿 안에 삽입될 내용 End -->

<a id="back-to-top" href="#" class="btn btn-outline-light text-dark" data-bs-toggle="tooltip" data-bs-placement="left"
   title="맨 위로 가기" style="position: fixed; bottom: 30px; right: 10px; z-index: 1; border-color: #000;">
   <i class="fas fa-arrow-up"></i>▲
</a>

<script>
window.addEventListener("load", function() {
    const btn_search = document.getElementById("btn_search");
    const search_input = document.getElementById("search_kw");

    if (btn_search) {
        btn_search.addEventListener('click', function(event) {
            document.getElementById('page').value = 1;
        });
    }

    if (search_input) {
        search_input.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                document.getElementById('page').value = 1;
            }
        }) 
    }
}); 
</script>
<script>
    document.addEventListener('click', e => {
        const box = document.getElementById('searchOptionBox');
        const btn = document.querySelector('[data-bs-target="#searchOptionBox"]');
        const input = document.getElementById('search_kw');
        if (box.classList.contains('show') && !box.contains(e.target) && !btn.contains(e.target) && !input.contains(e.target))
        bootstrap.Collapse.getInstance(box).hide();
});
</script>
{% endblock %}
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
